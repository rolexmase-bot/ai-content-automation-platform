<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<title>AI Content Platform</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1>AI content platform</h1>

<form action="/" method="post">

<div class="mb-3">

<label>

Article link

</label>

<input
type="text"
name="url"
class="form-control"
required>

</div>

<button
class="btn btn-primary">

Generate summary

</button>

</form>


{% if result %}

<hr>

<h3>title</h3>

<p>

{{result.title}}

</p>

<h3>summary</h3>

<p>

{{result.summary}}

</p>

<h3>keyword</h3>

<ul>

{% for item in result.keywords %}

<li>

{{item}}

</li>

{% endfor %}

</ul>

{% endif %}

</div>

</body>

</html>
